<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Riya Interview Room</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #202124;
      --surface: #292a2d;
      --surface-2: #35363a;
      --border: #3c4043;
      --text: #e8eaed;
      --text-dim: #9aa0a6;
      --accent: #8ab4f8;
      --danger: #ea4335;
      --ok: #34a853;
      --warn: #fbbc04;
      --error: #9aa0a6;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Google Sans", Roboto, Arial, sans-serif;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .topbar h1 {
      font-size: 16px;
      font-weight: 500;
      margin: 0;
      color: var(--text-dim);
    }

    .topbar .room-status {
      font-size: 13px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
    }
    .dot.connected { background: var(--ok); }

    .main {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    .stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-width: 0;
    }

    .video-tile {
      position: relative;
      width: min(100%, 860px);
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-tile video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    .video-tile .placeholder {
      color: var(--text-dim);
      font-size: 14px;
    }

    .video-tile .name-tag {
      position: absolute;
      left: 12px;
      bottom: 12px;
      background: rgba(0, 0, 0, 0.55);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 13px;
    }

    .video-tile .badge {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      background: rgba(0, 0, 0, 0.55);
    }

    .video-tile .bbox-layer {
      position: absolute;
      inset: 0;
      transform: scaleX(-1);
      pointer-events: none;
    }

    .video-tile .bbox-box {
      position: absolute;
      border: 2px solid #34a853;
      border-radius: 4px;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.35);
      transition: left 0.1s linear, top 0.1s linear, width 0.1s linear, height 0.1s linear;
    }

    .sidebar {
      width: 320px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--surface);
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      font-weight: 500;
    }

    .sidebar-header .sub {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 400;
      margin-top: 2px;
    }

    .log-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .log-empty {
      color: var(--text-dim);
      font-size: 13px;
      padding: 12px 4px;
    }

    .log-entry {
      background: var(--surface-2);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
    }

    .log-entry .row1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .log-entry .time {
      color: var(--text-dim);
    }

    .pill {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      color: #202124;
    }

    .pill.ok { background: var(--ok); }
    .pill.partial_frame { background: var(--warn); }
    .pill.no_person { background: var(--danger); color: white; }
    .pill.multiple_persons { background: var(--danger); color: white; }
    .pill.error { background: var(--error); }

    .log-entry .meta {
      color: var(--text-dim);
    }

    .log-entry .reason {
      color: var(--text);
      margin-top: 4px;
      font-style: italic;
    }

    .log-entry .snapshot {
      display: block;
      width: 100%;
      border-radius: 6px;
      margin-top: 6px;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 18px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .ctrl-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: var(--surface-2);
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ctrl-btn:hover { background: #45464a; }
    .ctrl-btn.off { background: #5f6368; color: var(--danger); }

    .ctrl-btn.leave {
      background: var(--danger);
      width: auto;
      padding: 0 24px;
      border-radius: 24px;
      color: white;
    }

    .ctrl-btn.leave:hover { background: #d33426; }

    .ctrl-btn.join {
      background: var(--accent);
      color: #202124;
      width: auto;
      padding: 0 28px;
      border-radius: 24px;
      font-weight: 500;
    }

    .ctrl-btn.join:hover { background: #aecbfa; }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1>Riya Interview Room</h1>
      <div class="room-status">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Not connected</span>
      </div>
    </div>

    <div class="main">
      <div class="stage">
        <div class="video-tile">
          <span class="placeholder" id="placeholder">Camera off</span>
          <video id="localVideo" autoplay muted playsinline></video>
          <div class="bbox-layer" id="bboxLayer"></div>
          <span class="badge" id="detectionBadge" style="display:none;"></span>
          <span class="name-tag">candidate-1</span>
        </div>
      </div>

      <div class="sidebar">
        <div class="sidebar-header">
          Detection Log
          <div class="sub">Live person-detection events from Riya's vision agent</div>
        </div>
        <div class="log-list" id="logList">
          <div class="log-empty" id="logEmpty">No events yet — join the room to start detection.</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="micBtn" title="Toggle microphone">🎤</button>
      <button class="ctrl-btn" id="camBtn" title="Toggle camera">📷</button>
      <button class="ctrl-btn join" id="joinBtn">Join Interview Room</button>
      <button class="ctrl-btn leave" id="leaveBtn" style="display:none;">Leave</button>
    </div>
  </div>

  <script type="module">
    import { Room, RoomEvent, createLocalVideoTrack, createLocalAudioTrack } from "https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.esm.mjs";

    const joinBtn = document.getElementById("joinBtn");
    const leaveBtn = document.getElementById("leaveBtn");
    const micBtn = document.getElementById("micBtn");
    const camBtn = document.getElementById("camBtn");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const localVideo = document.getElementById("localVideo");
    const placeholder = document.getElementById("placeholder");
    const detectionBadge = document.getElementById("detectionBadge");
    const logList = document.getElementById("logList");
    const logEmpty = document.getElementById("logEmpty");
    const bboxLayer = document.getElementById("bboxLayer");

    let room;
    let videoTrack;
    let audioTrack;
    let micEnabled = true;
    let camEnabled = true;

    const STATUS_LABELS = {
      ok: "Person detected",
      partial_frame: "Partially out of frame",
      no_person: "No person detected",
      multiple_persons: "Multiple people detected",
      error: "Detection error",
    };

    const STATUS_COLORS = {
      ok: "#34a853",
      partial_frame: "#fbbc04",
      no_person: "#ea4335",
      multiple_persons: "#ea4335",
      error: "#9aa0a6",
    };

    function setStatus(text, connected) {
      statusText.textContent = text;
      statusDot.classList.toggle("connected", !!connected);
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str ?? "";
      return div.innerHTML;
    }

    function addLogEntry(event) {
      logEmpty.style.display = "none";

      const entry = document.createElement("div");
      entry.className = "log-entry";

      const time = new Date(event.timestamp).toLocaleTimeString();
      const status = event.status || "error";
      const pillLabel = STATUS_LABELS[status] || status;
      const reasonHtml = event.reason
        ? `<div class="reason">${escapeHtml(event.reason)}</div>`
        : "";

      entry.innerHTML = `
        <div class="row1">
          <span class="pill ${status}">${pillLabel}</span>
          <span class="time">${time}</span>
        </div>
        <div class="meta">count: ${event.person_count ?? "-"} &middot; confidence: ${
          status !== "error" && typeof event.confidence === "number" ? event.confidence.toFixed(2) : "-"
        }</div>
        ${reasonHtml}
      `;

      if (event.snapshot_base64) {
        const img = document.createElement("img");
        img.className = "snapshot";
        img.src = `data:image/jpeg;base64,${event.snapshot_base64}`;
        img.alt = "Violation snapshot";
        entry.appendChild(img);
      }

      logList.appendChild(entry);
      logList.scrollTop = logList.scrollHeight;

      while (logList.children.length > 60) {
        logList.removeChild(logList.firstChild);
      }

      detectionBadge.textContent = pillLabel;
      detectionBadge.style.display = "inline-block";
      detectionBadge.style.background = STATUS_COLORS[status] || STATUS_COLORS.error;
    }

    const BOX_COLORS = {
      ok: "#34a853",
      partial_frame: "#fbbc04",
      low_confidence: "#fbbc04",
      multiple_persons: "#ea4335",
    };

    function updateBboxOverlay(event) {
      bboxLayer.innerHTML = "";

      const boxes = Array.isArray(event.boxes) && event.boxes.length
        ? event.boxes
        : Array.isArray(event.bbox) && event.bbox.length === 4
        ? [{ bbox: event.bbox }]
        : [];

      const color = BOX_COLORS[event.status] || "#34a853";

      for (const item of boxes) {
        const [x1, y1, x2, y2] = item.bbox;
        const box = document.createElement("div");
        box.className = "bbox-box";
        box.style.left = `${x1 * 100}%`;
        box.style.top = `${y1 * 100}%`;
        box.style.width = `${(x2 - x1) * 100}%`;
        box.style.height = `${(y2 - y1) * 100}%`;
        box.style.borderColor = color;
        bboxLayer.appendChild(box);
      }
    }

    joinBtn.onclick = async () => {
      try {
        joinBtn.disabled = true;
        setStatus("Getting token...", false);

        const response = await fetch("http://localhost:3001/token", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            roomName: "riya-interview-room",
            participantName: "candidate-1",
          }),
        });

        const data = await response.json();

        setStatus("Connecting...", false);

        room = new Room();

        room.on(RoomEvent.DataReceived, (payload, participant, kind, topic) => {
          if (topic !== "riya-vision-events") return;
          try {
            const event = JSON.parse(new TextDecoder().decode(payload));
            addLogEntry(event);
            updateBboxOverlay(event);
          } catch (e) {
            console.error("Bad detection event payload", e);
          }
        });

        room.on(RoomEvent.Disconnected, () => {
          setStatus("Not connected", false);
          resetToPreJoin();
        });

        await room.connect(data.livekitUrl, data.token);

        setStatus(`Connected: ${data.roomName}`, true);

        videoTrack = await createLocalVideoTrack();
        audioTrack = await createLocalAudioTrack();

        await room.localParticipant.publishTrack(videoTrack);
        await room.localParticipant.publishTrack(audioTrack);

        videoTrack.attach(localVideo);
        placeholder.style.display = "none";

        joinBtn.style.display = "none";
        leaveBtn.style.display = "inline-flex";
        joinBtn.disabled = false;
      } catch (error) {
        console.error(error);
        setStatus("Error: " + error.message, false);
        joinBtn.disabled = false;
      }
    };

    leaveBtn.onclick = async () => {
      if (room) {
        await room.disconnect();
      }
    };

    micBtn.onclick = () => {
      if (!audioTrack) return;
      micEnabled = !micEnabled;
      micEnabled ? audioTrack.unmute() : audioTrack.mute();
      micBtn.classList.toggle("off", !micEnabled);
      micBtn.textContent = micEnabled ? "🎤" : "🔇";
    };

    camBtn.onclick = () => {
      if (!videoTrack) return;
      camEnabled = !camEnabled;
      camEnabled ? videoTrack.unmute() : videoTrack.mute();
      camBtn.classList.toggle("off", !camEnabled);
      placeholder.style.display = camEnabled ? "none" : "block";
    };

    function resetToPreJoin() {
      joinBtn.style.display = "inline-flex";
      leaveBtn.style.display = "none";
      placeholder.style.display = "block";
      detectionBadge.style.display = "none";
      bboxLayer.innerHTML = "";
      micEnabled = true;
      camEnabled = true;
      micBtn.classList.remove("off");
      camBtn.classList.remove("off");
      micBtn.textContent = "🎤";
      if (localVideo.srcObject) {
        localVideo.srcObject = null;
      }
    }
  </script>
</body>
</html>
